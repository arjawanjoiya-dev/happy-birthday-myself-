<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday, Myself ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#000;
overflow:hidden;
color:white;

}

#intro{

position:fixed;
width:100%;
height:100%;
background:black;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

}

#terminal{

width:95%;
max-width:800px;

background:#050505;

border:2px solid #00ff99;

border-radius:15px;

padding:20px;

box-shadow:0 0 25px #00ff99;

font-size:18px;

line-height:35px;

color:#00ff99;

}

.cursor{

display:inline-block;

width:12px;

background:#00ff99;

animation:blink .7s infinite;

}

@keyframes blink{

50%{

opacity:0;

}

}

</style>

</head>

<body>

<div id="intro">

<div id="terminal">

<div id="typing"></div>

<span class="cursor"></span>

</div>

</div>

<script>

const lines=[

"> Booting Birthday Engine...",

"> Loading Happiness...",

"> █████████████████ 100%",

"> Searching Birthday Star...",

"> SUCCESS",

"> Identity Verified",

"> USER : MYSELF ❤️",

"> Preparing Surprise...",

"> Balloons Loaded 🎈",

"> Cake Loaded 🎂",

"> Gifts Loaded 🎁",

"> Fireworks Loaded 🎆",

"> ACCESS GRANTED ✔",

"",

"Welcome Birthday Girl... 💖"

];

let line=0;

let char=0;

let typing=document.getElementById("typing");

function type(){

if(line<lines.length){

if(char<lines[line].length){

typing.innerHTML+=lines[line].charAt(char);

char++;

setTimeout(type,40);

}

else{

typing.innerHTML+="<br>";

line++;

char=0;

setTimeout(type,350);

}

}

}

type();

</script>

</body>
</html>
