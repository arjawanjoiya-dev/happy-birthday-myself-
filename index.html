<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💖</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Consolas,monospace;
}

body{
background:#000;
overflow:hidden;
color:#00ff99;
}

#terminal{
padding:20px;
font-size:18px;
line-height:34px;
white-space:pre-wrap;
}

.cursor{
display:inline-block;
width:10px;
background:#00ff99;
animation:blink .7s infinite;
}

@keyframes blink{
50%{opacity:0;}
}

#gift{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#ff0080,#6a00ff);
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
animation:fade 1.5s;
}

#gift h1{
font-size:48px;
color:white;
text-shadow:0 0 25px gold;
margin-bottom:20px;
}

#gift p{
font-size:22px;
color:white;
max-width:700px;
line-height:38px;
}

button{
margin-top:35px;
padding:15px 40px;
border:none;
border-radius:40px;
font-size:22px;
cursor:pointer;
background:white;
color:#ff1493;
font-weight:bold;
}

button:hover{
transform:scale(1.08);
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div id="terminal"></div>

<div id="gift">

<h1>🎂 Happy Birthday 🎂</h1>

<p>
To the most amazing birthday girl... ❤️<br><br>

Today is all about smiles, dreams, happiness and beautiful memories.

May Allah bless you with success, peace, endless happiness and every dream you wish for.

Keep smiling because your smile makes the world brighter. 🌸
</p>

<button onclick="startFireworks()">Open Final Surprise 🎁</button>

</div>

<script>

const terminal=document.getElementById("terminal");
const lines = [
"> Booting Birthday System...",
"> Loading Happiness...",
"> Connecting To Smile Server...",
"> Checking Birthday Status...",
"> Birthday Detected ✔",
"",
"> Welcome Firdous ❤️",
"",
"> Loading Surprise..."
];

let line = 0;
let char = 0;

function typeWriter(){

    if(line >= lines.length){

        setTimeout(showGift,1000);
        return;

    }

    if(char < lines[line].length){

        terminal.innerHTML += lines[line].charAt(char);
        char++;

        setTimeout(typeWriter,40);

    }else{

        terminal.innerHTML += "<br>";
        line++;
        char=0;

        setTimeout(typeWriter,350);

    }

}

typeWriter();

function showGift(){

document.getElementById("terminal").style.display="none";
document.getElementById("gift").style.display="flex";

  }  
function startFireworks(){

createFirework();

setInterval(createFirework,1200);

}

setInterval(()=>{

if(document.getElementById("gift").style.display==="flex"){

createFirework();

}

},1500);

document.addEventListener("click",()=>{

if(document.getElementById("gift").style.display==="flex"){

createFirework();

}

});

</script>

</body>
</html>
