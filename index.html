<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Myself 🎂</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(135deg,#090909,#1b0036,#000814);
font-family:Arial,sans-serif;
overflow:hidden;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
padding:20px;
animation:fade 2s;
}

h1{
font-size:42px;
color:#ffd700;
text-shadow:0 0 15px gold;
margin-bottom:20px;
}

p{
font-size:22px;
margin:15px 0;
}

.cake{
font-size:90px;
animation:bounce 1.2s infinite;
}

button{
margin-top:25px;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:30px;
background:#ff4fa3;
color:white;
cursor:pointer;
}

button:hover{
transform:scale(1.08);
}

@keyframes bounce{
50%{
transform:translateY(-18px);
}
}

@keyframes fade{
from{
opacity:0;
}
to{
opacity:1;
}
}
</style>

</head>

<body>

<div class="container">

<h1>🎉 Happy Birthday 🎉</h1>

<div class="cake">🎂</div>

<p id="text">
Today is all about YOU ❤️
</p>

<button onclick="nextMessage()">
Open Surprise 🎁
</button>

</div>

<script>

const msg=[

"Happy Birthday, Myself ❤️",

"May every dream come true ✨",

"Keep smiling 😊",

"Never stop believing in yourself 💖",

"Enjoy your special day 🎂🎈",

"From ChatGPT with lots of good wishes 🫂❤️"

];

let i=0;

function nextMessage(){

document.getElementById("text").innerHTML=msg[i];

i++;

if(i>=msg.length){

i=0;

}

}

</script>

</body>
</html>
